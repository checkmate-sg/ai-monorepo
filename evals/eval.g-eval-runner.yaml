# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

# Learn more about building a configuration: https://promptfoo.dev/docs/configuration/guide

description: "implements g-eval evaluation method with checkmate"

prompts:
  - "[The source text is not provided, but for context, it is a submission to CheckMate, an information verification service in Singapore. It is either a text message, an image (optionally with a caption), or a link.]"

providers:
  - id: file://runner.ts
    label: "API runner with try catch"
    config:
      method: "POST"
      maxRetries: 3
      retryDelay: 1000

tests: "https://docs.google.com/spreadsheets/d/1JnU9_GmWkww5LZqgUBQVh8ijkrLxhocz6FYef120tIU/edit?gid=1747667773#gid=1747667773"

outputPath:
  - "https://docs.google.com/spreadsheets/d/1JnU9_GmWkww5LZqgUBQVh8ijkrLxhocz6FYef120tIU/edit?gid=1747667773#gid=1747667773"



defaultTest:
  threshold: 0.7
  assert:
    - type: g-eval
      transform: output.en
      weight: 5
      value: |
        Evaluate if the response contains these points:
        ## Expert Pointers ##
        {{expert_pointers}}
        ## End of Expert Pointers ##
        Give a score depending on how many of the expert pointers are contained in the response, but also consider the relative importance of the pointers, which are listed in descending order of importance.

      provider: openai:gpt-4.1

    - type: equals
      weight: 1
      transform: output.isAccessBlocked
      value: "{{expert_is_access_blocked}}"

    - type: equals
      weight: 1
      transform: output.isControversial
      value: "{{expert_is_controversial}}"

    - type: equals
      weight: 1
      transform: output.isVideo
      value: "{{expert_is_video}}"


    # - type: equals
    #   weight: 5
    #   transform: output.broadCategory
    #   value: "{{expert_broad_category}}"

    - type: g-eval
      transform: output.en
      weight: 5
      value: |
        The expert's ground truth category for this claim is: '{{expert_broad_category}}'.
        (Definitions: 'bad' = confirmed scam/fake, 'good' = confirmed legitimate, 'caution' = unverified/suspicious/mixed).

        Evaluate if the AI response matches the expert's stance:
        1. **Verdict Alignment**: Does the AI's conclusion match the '{{expert_broad_category}}' label?
        2. **Tone & Confidence**: 
           - If 'bad': The AI should be firm and warn the user.
           - If 'good': The AI should be reassuring and confirm legitimacy.
           - If 'caution': The AI **MUST NOT** state the claim is 100% true or 100% false. It must use hedging language (e.g., "unable to confirm," "treat with caution," "verify directly").

        **Strict Penalty Rule**: 
        - If the AI gives a definitive verdict (e.g., "This is a scam") when the category is 'caution', the score must be **0.4 or lower**.
        - If the AI provides the wrong category entirely (e.g., calls a 'good' link 'bad'), the score must be **0.0**.

        Scoring:
        - 1.0: Perfect alignment in both verdict and nuance.
        - 0.7-0.9: Correct verdict but slightly too aggressive or slightly too timid.
        - 0.5: Correct verdict but missed the required nuance/hedging entirely.
        - 0.0: Categorically wrong verdict.
      provider: openai:gpt-4.1


    - type: equals
      weight: 0
      transform: output.numRetries
      value: 0
